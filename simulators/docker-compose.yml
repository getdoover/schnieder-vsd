services:
  device_agent:
    image: spaneng/doover_device_agent:apps
    network_mode: host

  atv600_simulator:
    build: ./atv600
    network_mode: host
    restart: unless-stopped
    environment:
      - SIM_PORT=5020
      - SIM_SLAVE_ID=1

  schneider_vsd:
    build: ../
    network_mode: host
    restart: unless-stopped
    depends_on:
      - device_agent
      - atv600_simulator
    environment:
      - APP_KEY=schneider_vsd_test
      - CONFIG_FP=/app/simulators/app_config.json
